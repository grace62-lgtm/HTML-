<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Home - Classroom</title>
    <link id="favicon" rel="icon" href="classroom.png" type="image/png" />
  </head>
  <body>
    <h1>HTML 파일 실행기</h1>
    <p>파일 탐색기로 HTML 파일을 선택하면 아래 프레임에서 바로 실행됩니다.</p>

    <div class="controls">
      <label>HTML 파일 선택:</label><br />
      <input type="file" id="file-input" accept=".html,.htm" /><br />

      <label>탭 제목 바꾸기:</label><br />
      <input type="text" id="title-input" placeholder="새 탭 제목 입력" /><br />

      <label>파비콘 변경 (URL 입력):</label><br />
      <input
        type="text"
        id="favicon-input"
        placeholder="https://example.com/favicon.ico"
      /><br />
      <button id="apply-favicon">적용</button>
    </div>

    <h3>실행 결과:</h3>
    <iframe id="view-area" style="width: 100%; height: 90vh"></iframe>

    <script>
      const fileInput = document.getElementById("file-input");
      const viewArea = document.getElementById("view-area");
      const titleInput = document.getElementById("title-input");
      const faviconInput = document.getElementById("favicon-input");
      const applyFaviconBtn = document.getElementById("apply-favicon");
      const faviconLink = document.getElementById("favicon");

      // 파일 읽기 함수
      function loadFile(file) {
        if (
          file &&
          (file.type === "text/html" || file.name.endsWith(".html"))
        ) {
          const reader = new FileReader();
          reader.onload = function (e) {
            const blob = new Blob([e.target.result], { type: "text/html" });
            viewArea.src = URL.createObjectURL(blob);
          };
          reader.readAsText(file);
        } else {
          alert("HTML 파일만 열 수 있습니다.");
        }
      }

      // 파일 선택창 이벤트
      fileInput.addEventListener("change", (e) => {
        loadFile(e.target.files[0]);
      });

      // 탭 제목 변경
      titleInput.addEventListener("input", () => {
        document.title = titleInput.value || "HTML 파일 실행기";
      });

      // 파비콘 변경
      applyFaviconBtn.addEventListener("click", () => {
        const url = faviconInput.value.trim();
        if (url) {
          faviconLink.href = url;
        } else {
          alert("유효한 URL을 입력하세요.");
        }
      });
    </script>
  </body>
</html>
